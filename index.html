<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>兒童數獨</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="topbar">
          <div>
            <p class="eyebrow" id="rule-label">4x4 Sudoku</p>
            <h1 id="game-title">小小數獨</h1>
          </div>
          <button class="icon-button" id="new-game" type="button" aria-label="換一題" title="換一題">
            ↻
          </button>
        </div>

        <div class="app-tabs" role="group" aria-label="選擇遊戲">
          <button class="pill-button active" type="button" data-app="sudoku">數獨</button>
          <button class="pill-button" type="button" data-app="maze">算術迷宮</button>
        </div>

        <div class="sudoku-game">
        <div class="control-block">
          <p class="control-label">尺寸</p>
          <div class="size-picker" id="size-picker" role="group" aria-label="選擇尺寸">
            <button class="pill-button active" type="button" data-size="4">4x4</button>
            <button class="pill-button" type="button" data-size="5">5x5</button>
            <button class="pill-button" type="button" data-size="6">6x6</button>
            <button class="pill-button" type="button" data-size="7">7x7</button>
            <button class="pill-button" type="button" data-size="8">8x8</button>
            <button class="pill-button" type="button" data-size="9">9x9</button>
          </div>
        </div>

        <div class="control-block">
          <p class="control-label">玩法</p>
          <div class="mode-picker" role="group" aria-label="選擇玩法">
            <button class="pill-button active" type="button" data-mode="sudoku">Sudoku</button>
            <button class="pill-button" type="button" data-mode="number">Number Grid</button>
          </div>
        </div>

        <div class="control-block">
          <p class="control-label">難度</p>
          <div class="difficulty" role="group" aria-label="選擇難度">
            <button class="pill-button active" type="button" data-level="starter">入門</button>
            <button class="pill-button" type="button" data-level="easy">簡單</button>
            <button class="pill-button" type="button" data-level="hard">困難</button>
            <button class="pill-button" type="button" data-level="challenge">挑戰</button>
            <button class="pill-button" type="button" data-level="hell">地獄</button>
          </div>
        </div>

        <div class="board-wrap">
          <div class="board" id="board" aria-label="數獨棋盤"></div>
        </div>

        <div class="history-controls" aria-label="步驟控制">
          <button class="step-button" id="undo-step" type="button">上一步</button>
          <button class="step-button" id="redo-step" type="button">下一步</button>
        </div>

        <p class="message" id="message" role="status" aria-live="polite">點空格，選一個可以放的數字。</p>
        </div>

        <div class="maze-game is-hidden">
          <div class="control-block">
            <p class="control-label">年級</p>
            <div class="grade-picker" role="group" aria-label="選擇年級">
              <button class="pill-button active" type="button" data-grade="1">1</button>
              <button class="pill-button" type="button" data-grade="2">2</button>
              <button class="pill-button" type="button" data-grade="3">3</button>
              <button class="pill-button" type="button" data-grade="4">4</button>
              <button class="pill-button" type="button" data-grade="5">5</button>
              <button class="pill-button" type="button" data-grade="6">6</button>
            </div>
          </div>

          <div class="control-block">
            <p class="control-label">運算</p>
            <div class="operator-picker" role="group" aria-label="選擇運算">
              <button class="pill-button active" type="button" data-operator="add">加法</button>
              <button class="pill-button active" type="button" data-operator="subtract">減法</button>
              <button class="pill-button active" type="button" data-operator="multiply">乘法</button>
              <button class="pill-button active" type="button" data-operator="divide">除法</button>
            </div>
          </div>

          <div class="control-block">
            <p class="control-label">地圖</p>
            <div class="maze-size-picker" role="group" aria-label="選擇地圖大小">
              <button class="pill-button active" type="button" data-maze-size="5">5x5</button>
              <button class="pill-button" type="button" data-maze-size="10">10x10</button>
              <button class="pill-button" type="button" data-maze-size="15">15x15</button>
              <button class="pill-button" type="button" data-maze-size="20">20x20</button>
              <button class="pill-button" type="button" data-maze-size="25">25x25</button>
            </div>
          </div>

          <div class="control-block">
            <p class="control-label">視野</p>
            <div class="fog-picker" role="group" aria-label="選擇迷霧視野">
              <button class="pill-button active" type="button" data-fog-size="2">2x2</button>
              <button class="pill-button" type="button" data-fog-size="3">3x3</button>
              <button class="pill-button" type="button" data-fog-size="4">4x4</button>
            </div>
          </div>

          <div class="maze-wrap">
            <div class="maze-path" id="maze-path" aria-label="算術迷宮路線"></div>
          </div>

          <section class="maze-card" aria-live="polite">
            <p class="maze-progress" id="maze-progress">第 1 / 8 格</p>
            <div class="maze-question" id="maze-question">3 + 4 = ?</div>
            <div class="answer-grid" id="answer-grid"></div>
          </section>

          <p class="message maze-message" id="maze-message" role="status" aria-live="polite">答對就往前走一格。</p>
        </div>
      </section>
    </main>

    <div class="mobile-choice-panel" id="mobile-choice-panel" aria-live="polite" hidden>
      <div class="mobile-choice-header">
        <span id="mobile-choice-title">選一個數字</span>
        <button class="mobile-close-button" id="mobile-choice-close" type="button" aria-label="關閉選項">×</button>
      </div>
      <div class="mobile-choice-grid" id="mobile-choice-grid"></div>
    </div>

    <div class="celebration" id="celebration" aria-hidden="true"></div>

    <script src="app.js"></script>
  </body>
</html>
